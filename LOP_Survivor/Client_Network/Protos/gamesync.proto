syntax = "proto3";
package GameSync;

message ProtoPos {
  float x = 1;
  float y = 2;
  float z = 3;
}

message ProtoRot {
  float x = 1;
  float y = 2;
  float z = 3;
}

message GameMessage {
  string playerId = 1;
  int64 timestamp = 2;

  oneof payload {
    Join join = 3;
    Leave leave = 4;
    PositionSync position = 5;
    AnimationState animState = 6;
    AnimationTrigger animTrigger = 7;
    ItemEquip itemEquip = 8;

    RPC rpc = 9;
    ChatMessage chatMessage = 10;
    NetworkInstantiate networkInstantiate = 11; 
    NetworkObjectList networkObjectList = 12;
    MapBlockUpdate mapBlockUpdate = 13;
    BlockDestroyFlag blockDestroyFlag = 14;
    ObjectDestroyMessage objectDestroyMessage = 15;
  }
}

message Join {
    optional bool isWorldSpawner = 1;
}
message Leave {}

message PositionSync {
  int32 sequence = 1;
  float x = 2;
  float y = 3;
  float z = 4;
  float rotY = 5;
}

message AnimationState {
  map<int32, bool> states = 1;
}

message AnimationTrigger {
  repeated int32 triggers = 1;
}

message ItemEquip {
  int32 itemId = 1;
}

message RPC {
  int32 networkId = 1;      
  int32 methodHash = 2;     
  bytes parameters = 3;
}

message ChatMessage {
  string message = 1;
}

message NetworkInstantiate {
  int32 networkId = 1;        
  int32 prefabHash = 2;       
  ProtoPos position = 3;      
  ProtoRot rotation = 4;      
  optional string ownerPlayerId = 5; 
}

message NetworkObjectList {
  repeated NetworkInstantiate objects = 1;
}

message MapBlockUpdate {
  int32 x = 1;
  int32 y = 2;
  int32 z = 3;
  string newBlockId = 4;
}

message BlockDestroyFlag {
    int32 x = 1;
    int32 y = 2;
    int32 z = 3;
    
    bool is_destroyed = 4;
}

message ObjectDestroyMessage {
    int32 networkId = 1; 
}
